services:
  app:
    build: .
    environment:
      BANYAN_DB_DIALECT: postgres
      BANYAN_POSTGRES_DSN: postgresql://postgres:postgres@postgres:5432/banyan
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: banyan
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run start -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
